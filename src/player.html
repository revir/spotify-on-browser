<!doctype html>
<html lang="en" ng-app="musicPlayer">
  <head>
    <meta charset="UTF-8" />
    <title>Spotify on Browser</title>
  </head>

  <body>
    <div ng-controller="musicPlayerCtrl">
      <div class="toolbar navbar-fixed-top">
        <div class="toolbar-left">
          <a href="" title="Open Spotify" ng-click="openTrackLink()">
            <img
              src="https://storage.googleapis.com/pr-newsroom-wp/1/2018/11/favicon-32x32.png"
              alt="Spotify"
            />
          </a>
        </div>

        <!-- Modern Pill Tab Switcher -->
        <div class="tab-switcher">
          <div
            class="tab-pill"
            ng-style="{'transform': 'translateX(' + (activeTab === 'library' ? '100%' : '0') + ')'}"
          ></div>
          <button
            class="tab-btn"
            ng-class="{'active': activeTab === 'playing'}"
            ng-click="activeTab = 'playing'"
          >
            <i class="fa fa-play"></i> Playing
          </button>
          <button
            class="tab-btn"
            ng-class="{'active': activeTab === 'library'}"
            ng-click="switchToLibrary()"
          >
            <i class="fa fa-bookmark"></i> Library
          </button>
        </div>

        <div class="toolbar-right">
          <a href="" title="Go to settings" ng-click="openOptions()">
            <i class="fa fa-cog" aria-hidden="true"></i>
          </a>
          <a href="" title="What is this?" ng-click="openHelpLink()">
            <i class="fa fa-question-circle" aria-hidden="true"></i>
          </a>
        </div>
      </div>

      <!-- Playing View -->
      <div class="player-context" ng-show="activeTab === 'playing'">
        <div class="text-center preliminary">
          <img
            ng-src="{{albumImage.url}}"
            class="active"
            ng-if="albumImage && !errorMessage"
          />
          <div ng-if="!spotifyState" class="loading-state">
            <i class="fa fa-spinner fa-spin"></i>
            <p>Connecting to Spotify...</p>
          </div>
          <div ng-if="spotifyState && errorMessage" class="error-message">
            <i class="fa fa-warning"></i>
            {{errorMessage}}
          </div>
          <a
            href=""
            ng-if="spotifyState && !isSpotifyReady && !errorMessage"
            ng-click="toggleAction()"
          >
            Authorize Spotify on {{browserName}}
          </a>
          <a
            href=""
            ng-if="!trackName && isSpotifyReady"
            ng-click="toggleAction('togglePlay')"
          >
            Start to play
          </a>
          <div ng-if="trackName && !errorMessage" class="track-wrapper">
            <p class="track-name">
              <a target="_blank" ng-href="{{trackHref}}"> {{trackName}} </a>
            </p>
            <p class="artist-name ellipsis">
              <a target="_blank" ng-href="{{artistHref}}"> {{artistName}} </a>
            </p>

            <div
              class="button saved-track"
              ng-hide="trackSaved == undefined"
              ng-disabled="savingTrack"
              ng-click="toggleSavedTrack()"
            >
              <i
                class="fa"
                ng-class="{'fa-heart': trackSaved, 'fa-heart-o': !trackSaved}"
              ></i>
            </div>
          </div>
        </div>
      </div>
      <div class="player-content" ng-show="activeTab === 'playing'">
        <div id="album-art">
          <a target="_blank" ng-href="{{albumHref}}">
            <img
              ng-src="{{artistImage.url || albumImage.url}}"
              ng-class="{'active': playing}"
              ng-if="artistImage || albumImage"
            />
          </a>
        </div>
        <div id="player-controls">
          <div class="control">
            <div
              class="button"
              ng-disabled="!canSeekPrev"
              ng-click="toggleAction('previousTrack')"
            >
              <i class="fa fa-step-backward"></i>
            </div>
          </div>
          <div class="control">
            <div
              class="button"
              ng-disabled="!canPause"
              ng-if="playing"
              ng-click="toggleAction('togglePlay')"
            >
              <i class="fa fa-pause"></i>
            </div>
            <div
              class="button"
              ng-if="!playing"
              ng-click="toggleAction('togglePlay')"
            >
              <i class="fa fa-play"></i>
            </div>
          </div>
          <div class="control">
            <div
              class="button"
              ng-disabled="!canSeekNext"
              ng-click="toggleAction('nextTrack')"
            >
              <i class="fa fa-step-forward"></i>
            </div>
          </div>

          <div
            class="control volume-wrapper"
            ng-disabled="currentVolume == null || !trackName"
          >
            <div
              class="button"
              ng-disabled="currentVolume == null || !trackName"
            >
              <i class="fa fa-volume-up" aria-hidden="true"></i>
            </div>
            <input
              type="range"
              id="volume-slider"
              min="0"
              max="100"
              ng-model="currentVolume"
              class="volume-slider"
            />
          </div>
        </div>
      </div>

      <!-- Library View -->
      <div class="library-view" ng-show="activeTab === 'library'">
        <div class="library-section">
          <h3 class="section-title">Playlists</h3>
          <div class="playlist-grid">
            <!-- Liked Songs (always first) -->
            <div class="playlist-card" ng-click="playLikedSongs()">
              <div class="playlist-cover liked-songs-cover">
                <i class="fa fa-heart"></i>
              </div>
              <p class="playlist-name">Liked Songs</p>
            </div>
            <!-- User Playlists -->
            <div
              class="playlist-card"
              ng-repeat="playlist in playlists"
              ng-click="playPlaylist(playlist)"
            >
              <div class="playlist-cover">
                <img
                  ng-src="{{playlist.images[0].url}}"
                  ng-if="playlist.images.length"
                />
                <i class="fa fa-music" ng-if="!playlist.images.length"></i>
              </div>
              <p class="playlist-name">{{playlist.name}}</p>
            </div>
          </div>
        </div>

        <div class="library-section">
          <h3 class="section-title">Podcasts</h3>
          <div class="playlist-grid">
            <div
              class="playlist-card"
              ng-repeat="episode in savedEpisodes"
              ng-click="playEpisode(episode)"
            >
              <div class="playlist-cover">
                <img
                  ng-src="{{episode.images[0].url}}"
                  ng-if="episode.images.length"
                />
                <i class="fa fa-podcast" ng-if="!episode.images.length"></i>
              </div>
              <p class="playlist-name">{{episode.name}}</p>
            </div>
            <div
              class="playlist-card empty-state"
              ng-if="!savedEpisodes.length"
            >
              <p>No saved podcasts</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
